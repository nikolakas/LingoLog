<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LingoLog — Your Social Dictionary</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <!-- lucide-react's UMD build looks for React at window.react (lowercase) -->
  <script>window.react = window.React;</script>
  <script src="https://unpkg.com/lucide-react@0.263.1/dist/umd/lucide-react.js"></script>
  <!-- Pin Babel 7: the unversioned URL serves Babel 8, whose react preset
       emits `import` statements (automatic JSX runtime) that break in a
       classic script and leave the page blank. -->
  <script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50: '#eef7f4', 100: '#d6ede5', 200: '#aedbcc',
              400: '#3ea88a', 500: '#2c8f74', 600: '#22735d',
              700: '#1d5c4b', 900: '#123a30',
            },
            sand: { 50: '#faf8f5', 100: '#f3efe8', 200: '#e7dfd2' },
          },
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
        },
      },
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    body { background: #e5e1da; }
    ::-webkit-scrollbar { width: 0; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
    const { useState, useMemo, useEffect, useRef } = React;
    const {
      Search, Plus, BookOpen, Globe2, X, Volume2,
      User, MapPin, Quote, Check, Sparkles, ChevronRight,
      Instagram, Linkedin, Tag, Download, Upload,
    } = LucideReact;

    // ---------- Static data ----------

    const COUNTRIES = [
      { name: 'Argentina', flag: '🇦🇷' },
      { name: 'Australia', flag: '🇦🇺' },
      { name: 'Austria', flag: '🇦🇹' },
      { name: 'Belgium', flag: '🇧🇪' },
      { name: 'Brazil', flag: '🇧🇷' },
      { name: 'Bulgaria', flag: '🇧🇬' },
      { name: 'Canada', flag: '🇨🇦' },
      { name: 'Chile', flag: '🇨🇱' },
      { name: 'China', flag: '🇨🇳' },
      { name: 'Colombia', flag: '🇨🇴' },
      { name: 'Croatia', flag: '🇭🇷' },
      { name: 'Cuba', flag: '🇨🇺' },
      { name: 'Czechia', flag: '🇨🇿' },
      { name: 'Denmark', flag: '🇩🇰' },
      { name: 'Egypt', flag: '🇪🇬' },
      { name: 'Finland', flag: '🇫🇮' },
      { name: 'France', flag: '🇫🇷' },
      { name: 'Germany', flag: '🇩🇪' },
      { name: 'Greece', flag: '🇬🇷' },
      { name: 'Hungary', flag: '🇭🇺' },
      { name: 'Iceland', flag: '🇮🇸' },
      { name: 'India', flag: '🇮🇳' },
      { name: 'Indonesia', flag: '🇮🇩' },
      { name: 'Iran', flag: '🇮🇷' },
      { name: 'Ireland', flag: '🇮🇪' },
      { name: 'Israel', flag: '🇮🇱' },
      { name: 'Italy', flag: '🇮🇹' },
      { name: 'Japan', flag: '🇯🇵' },
      { name: 'Kenya', flag: '🇰🇪' },
      { name: 'Mexico', flag: '🇲🇽' },
      { name: 'Morocco', flag: '🇲🇦' },
      { name: 'Netherlands', flag: '🇳🇱' },
      { name: 'New Zealand', flag: '🇳🇿' },
      { name: 'Nigeria', flag: '🇳🇬' },
      { name: 'Norway', flag: '🇳🇴' },
      { name: 'Peru', flag: '🇵🇪' },
      { name: 'Philippines', flag: '🇵🇭' },
      { name: 'Poland', flag: '🇵🇱' },
      { name: 'Portugal', flag: '🇵🇹' },
      { name: 'Romania', flag: '🇷🇴' },
      { name: 'Russia', flag: '🇷🇺' },
      { name: 'Saudi Arabia', flag: '🇸🇦' },
      { name: 'Serbia', flag: '🇷🇸' },
      { name: 'South Africa', flag: '🇿🇦' },
      { name: 'South Korea', flag: '🇰🇷' },
      { name: 'Spain', flag: '🇪🇸' },
      { name: 'Sweden', flag: '🇸🇪' },
      { name: 'Switzerland', flag: '🇨🇭' },
      { name: 'Thailand', flag: '🇹🇭' },
      { name: 'Turkey', flag: '🇹🇷' },
      { name: 'Ukraine', flag: '🇺🇦' },
      { name: 'United Kingdom', flag: '🇬🇧' },
      { name: 'United States', flag: '🇺🇸' },
      { name: 'Vietnam', flag: '🇻🇳' },
    ];

    const CATEGORIES = [
      'Basics', 'Greetings', 'Slang', 'Curse words', 'Food & drink',
      'Compliments', 'Travel', 'Untranslatable', 'Other',
    ];

    const flagFor = (country) =>
      (COUNTRIES.find((c) => c.name === country) || {}).flag || '🌍';

    // Start with an empty log — every word in it is one you collected yourself.
    const INITIAL_WORDS = [];

    // ---------- Small building blocks ----------

    const EMPTY_FORM = {
      word: '', pronunciation: '', meaning: '',
      context: '', taughtBy: '', country: COUNTRIES[0].name,
      category: CATEGORIES[0],
    };

    function Field({ label, required, children }) {
      return (
        <label className="block">
          <span className="mb-1.5 block text-xs font-semibold uppercase tracking-wide text-brand-700">
            {label} {required && <span className="text-rose-400">*</span>}
          </span>
          {children}
        </label>
      );
    }

    const inputCls =
      'w-full rounded-xl border border-sand-200 bg-white px-4 py-3 text-[15px] text-slate-800 ' +
      'placeholder:text-slate-400 shadow-sm outline-none transition ' +
      'focus:border-brand-400 focus:ring-2 focus:ring-brand-200';

    // ---------- Word card ----------

    function WordCard({ entry, onSelect }) {
      return (
        <button
          onClick={() => onSelect(entry)}
          className="w-full rounded-2xl bg-white p-4 text-left shadow-sm ring-1 ring-black/[0.04] transition active:scale-[0.985] hover:shadow-md"
        >
          <div className="flex items-start justify-between gap-3">
            <div className="min-w-0">
              <div className="flex items-baseline gap-2">
                <span className="text-lg font-bold text-slate-900">{entry.word}</span>
                {entry.native !== entry.word && (
                  <span className="truncate text-base text-slate-500">{entry.native}</span>
                )}
              </div>
              <div className="mt-0.5 flex items-center gap-1.5 text-[13px] text-brand-600">
                <Volume2 size={13} strokeWidth={2.2} />
                <span className="italic">{entry.pronunciation}</span>
              </div>
              <p className="mt-1.5 text-[15px] leading-snug text-slate-600">{entry.meaning}</p>
            </div>
            <span className="shrink-0 text-2xl leading-none" title={entry.country}>
              {flagFor(entry.country)}
            </span>
          </div>
          <div className="mt-3 flex flex-wrap items-center justify-between gap-y-1.5 border-t border-sand-100 pt-2.5">
            <div className="flex items-center gap-1.5">
              <span className="inline-flex items-center gap-1.5 rounded-full bg-brand-50 px-2.5 py-1 text-xs font-medium text-brand-700">
                <User size={12} strokeWidth={2.4} />
                Taught by {entry.taughtBy}
              </span>
              {entry.category && (
                <span className="inline-flex items-center gap-1 rounded-full bg-sand-100 px-2.5 py-1 text-xs font-medium text-slate-500">
                  <Tag size={11} strokeWidth={2.4} />
                  {entry.category}
                </span>
              )}
            </div>
            <span className="inline-flex items-center gap-1 text-xs text-slate-400">
              {entry.country} <ChevronRight size={13} />
            </span>
          </div>
        </button>
      );
    }

    // ---------- Library view ----------

    function LibraryView({ words, query, setQuery, onSelect, onImport }) {
      const [catFilter, setCatFilter] = useState('All');
      const [countryFilter, setCountryFilter] = useState('All');

      const usedCountries = useMemo(
        () => [...new Set(words.map((w) => w.country))].sort(),
        [words]
      );

      const filtered = useMemo(() => {
        const q = query.trim().toLowerCase();
        return words.filter((w) => {
          if (catFilter !== 'All' && w.category !== catFilter) return false;
          if (countryFilter !== 'All' && w.country !== countryFilter) return false;
          if (!q) return true;
          return (
            w.word.toLowerCase().includes(q) ||
            w.native.toLowerCase().includes(q) ||
            w.meaning.toLowerCase().includes(q) ||
            w.taughtBy.toLowerCase().includes(q) ||
            w.country.toLowerCase().includes(q) ||
            (w.category || '').toLowerCase().includes(q)
          );
        });
      }, [words, query, catFilter, countryFilter]);

      const hasFilter = query || catFilter !== 'All' || countryFilter !== 'All';

      return (
        <div className="px-4 pb-32">
          <div className="sticky top-0 z-10 -mx-4 bg-sand-50/95 px-4 pb-3 pt-2 backdrop-blur">
            <div className="relative">
              <Search
                size={17}
                className="pointer-events-none absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400"
              />
              <input
                value={query}
                onChange={(e) => setQuery(e.target.value)}
                placeholder="Search words, meanings, people…"
                className={inputCls + ' pl-10'}
              />
              {query && (
                <button
                  onClick={() => setQuery('')}
                  className="absolute right-3 top-1/2 -translate-y-1/2 rounded-full bg-sand-100 p-1 text-slate-500"
                >
                  <X size={13} />
                </button>
              )}
            </div>

            {/* Category chips */}
            <div className="-mx-4 mt-2.5 flex gap-1.5 overflow-x-auto px-4 pb-0.5">
              {['All', ...CATEGORIES].map((c) => (
                <button
                  key={c}
                  onClick={() => setCatFilter(c)}
                  className={
                    'shrink-0 whitespace-nowrap rounded-full px-3 py-1.5 text-xs font-semibold transition ' +
                    (catFilter === c
                      ? 'bg-brand-600 text-white shadow-sm'
                      : 'bg-white text-slate-500 ring-1 ring-sand-200')
                  }
                >
                  {c === 'All' ? 'All categories' : c}
                </button>
              ))}
            </div>

            {/* Country filter */}
            {usedCountries.length > 1 && (
              <select
                value={countryFilter}
                onChange={(e) => setCountryFilter(e.target.value)}
                className="mt-2 w-full appearance-none rounded-xl border border-sand-200 bg-white px-3 py-2 text-[13px] font-medium text-slate-600 shadow-sm outline-none focus:border-brand-400"
              >
                <option value="All">🌍 All countries</option>
                {usedCountries.map((c) => (
                  <option key={c} value={c}>{flagFor(c)} {c}</option>
                ))}
              </select>
            )}
          </div>

          <p className="mb-2 mt-1 px-1 text-xs font-medium text-slate-400">
            {filtered.length} {filtered.length === 1 ? 'word' : 'words'}
            {query ? ` matching “${query}”` : hasFilter ? ' found' : ' in your log'}
          </p>

          <div className="flex flex-col gap-3">
            {filtered.map((w) => (
              <WordCard key={w.id} entry={w} onSelect={onSelect} />
            ))}
            {filtered.length === 0 && (hasFilter ? (
              <div className="mt-10 flex flex-col items-center gap-2 text-center">
                <div className="rounded-2xl bg-sand-100 p-4">
                  <Search size={26} className="text-slate-400" />
                </div>
                <p className="font-semibold text-slate-600">No matches</p>
                <p className="max-w-[220px] text-sm text-slate-400">
                  Try a different word, category, country, or the name of who taught you.
                </p>
              </div>
            ) : (
              <div className="mt-12 flex flex-col items-center gap-2 text-center">
                <div className="rounded-2xl bg-brand-50 p-4">
                  <BookOpen size={26} className="text-brand-500" />
                </div>
                <p className="font-semibold text-slate-600">Your log is empty</p>
                <p className="max-w-[240px] text-sm text-slate-400">
                  Tap the + button to save the first word someone teaches you.
                </p>
              </div>
            ))}
          </div>
          <BackupBar words={words} onImport={onImport} />
          <Credit />
        </div>
      );
    }

    // ---------- Backup: export / import ----------

    function BackupBar({ words, onImport }) {
      const fileRef = useRef(null);

      const exportWords = () => {
        const blob = new Blob([JSON.stringify(words, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'lingolog-backup.json';
        a.click();
        URL.revokeObjectURL(url);
      };

      const importFile = (e) => {
        const file = e.target.files && e.target.files[0];
        e.target.value = ''; // allow re-picking the same file
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => {
          try {
            const data = JSON.parse(reader.result);
            if (Array.isArray(data) && data.every((w) => w && w.word && w.meaning)) {
              onImport(data);
            } else {
              alert('That file is not a LingoLog backup.');
            }
          } catch (err) {
            alert('That file is not a LingoLog backup.');
          }
        };
        reader.readAsText(file);
      };

      const btnCls =
        'inline-flex items-center gap-1.5 rounded-full bg-white px-3.5 py-2 text-xs font-semibold ' +
        'text-slate-600 shadow-sm ring-1 ring-sand-200 transition hover:text-brand-600 active:scale-95 ' +
        'disabled:opacity-40 disabled:hover:text-slate-600';

      return (
        <div className="mt-8 flex items-center justify-center gap-2">
          <button onClick={exportWords} disabled={words.length === 0} className={btnCls}>
            <Download size={14} strokeWidth={2.2} /> Export backup
          </button>
          <button onClick={() => fileRef.current && fileRef.current.click()} className={btnCls}>
            <Upload size={14} strokeWidth={2.2} /> Import
          </button>
          <input ref={fileRef} type="file" accept=".json,application/json" onChange={importFile} className="hidden" />
        </div>
      );
    }

    // ---------- Credit footer ----------

    function Credit() {
      return (
        <div className="mt-4 flex flex-col items-center gap-2.5 pb-2">
          <p className="text-xs font-medium text-slate-400">
            Made by <span className="font-semibold text-slate-500">Nikolaos Damdounis</span>
          </p>
          <div className="flex items-center gap-2">
            <a
              href="https://www.instagram.com/n.damdounis/"
              target="_blank"
              rel="noopener noreferrer"
              className="inline-flex items-center gap-1.5 rounded-full bg-white px-3.5 py-2 text-xs font-semibold text-slate-600 shadow-sm ring-1 ring-sand-200 transition hover:text-brand-600 active:scale-95"
            >
              <Instagram size={14} strokeWidth={2.2} /> Instagram
            </a>
            <a
              href="https://www.linkedin.com/in/nikolaos-damdounis-486239300/"
              target="_blank"
              rel="noopener noreferrer"
              className="inline-flex items-center gap-1.5 rounded-full bg-white px-3.5 py-2 text-xs font-semibold text-slate-600 shadow-sm ring-1 ring-sand-200 transition hover:text-brand-600 active:scale-95"
            >
              <Linkedin size={14} strokeWidth={2.2} /> LinkedIn
            </a>
          </div>
        </div>
      );
    }

    // ---------- Word detail sheet ----------

    function WordDetail({ entry, onClose }) {
      if (!entry) return null;
      return (
        <div className="fixed inset-0 z-40 flex items-end justify-center bg-slate-900/40 backdrop-blur-[2px]" onClick={onClose}>
          <div
            onClick={(e) => e.stopPropagation()}
            className="w-full max-w-md rounded-t-3xl bg-white p-6 pb-10 shadow-2xl"
          >
            <div className="mx-auto mb-5 h-1.5 w-10 rounded-full bg-sand-200" />
            <div className="flex items-start justify-between">
              <div>
                <h2 className="text-2xl font-extrabold text-slate-900">{entry.word}</h2>
                {entry.native !== entry.word && (
                  <p className="text-lg text-slate-500">{entry.native}</p>
                )}
                <p className="mt-1 flex items-center gap-1.5 text-sm italic text-brand-600">
                  <Volume2 size={14} /> {entry.pronunciation}
                </p>
              </div>
              <span className="text-4xl">{flagFor(entry.country)}</span>
            </div>

            {entry.category && (
              <span className="mt-3 inline-flex items-center gap-1.5 rounded-full bg-sand-100 px-3 py-1.5 text-xs font-semibold text-slate-500">
                <Tag size={12} strokeWidth={2.4} /> {entry.category}
              </span>
            )}

            <div className="mt-4 rounded-2xl bg-brand-50 p-4">
              <p className="text-xs font-semibold uppercase tracking-wide text-brand-700">Meaning</p>
              <p className="mt-1 text-[15px] font-medium text-slate-800">{entry.meaning}</p>
            </div>

            {entry.context && (
              <div className="mt-3 rounded-2xl bg-sand-50 p-4">
                <p className="flex items-center gap-1.5 text-xs font-semibold uppercase tracking-wide text-slate-500">
                  <Quote size={12} /> How to use it
                </p>
                <p className="mt-1 text-[15px] leading-relaxed text-slate-600">{entry.context}</p>
              </div>
            )}

            <div className="mt-4 flex items-center justify-between text-sm text-slate-500">
              <span className="inline-flex items-center gap-1.5">
                <User size={14} className="text-brand-500" />
                Taught by <b className="text-slate-700">{entry.taughtBy}</b>
              </span>
              <span className="inline-flex items-center gap-1.5">
                <MapPin size={14} className="text-brand-500" /> {entry.country}
              </span>
            </div>
            {entry.addedOn && (
              <p className="mt-2 text-xs text-slate-400">Added {entry.addedOn}</p>
            )}
          </div>
        </div>
      );
    }

    // ---------- Add word view ----------

    function AddWordView({ onSave, onCancel }) {
      const [form, setForm] = useState(EMPTY_FORM);
      const set = (key) => (e) => setForm({ ...form, [key]: e.target.value });
      const valid = form.word.trim() && form.meaning.trim();

      const submit = (e) => {
        e.preventDefault();
        if (!valid) return;
        onSave({
          ...form,
          word: form.word.trim(),
          native: form.word.trim(),
          taughtBy: form.taughtBy.trim() || 'a friend',
          addedOn: new Date().toLocaleDateString('en-US', {
            month: 'long', day: 'numeric', year: 'numeric',
          }),
        });
      };

      return (
        <div className="fixed inset-0 z-30 flex justify-center bg-slate-900/40 backdrop-blur-[2px]">
          <div className="flex h-full w-full max-w-md flex-col bg-sand-50">
            <header className="flex items-center justify-between border-b border-sand-200 bg-white px-4 py-4">
              <button onClick={onCancel} className="rounded-full p-2 text-slate-500 hover:bg-sand-100">
                <X size={20} />
              </button>
              <h2 className="text-base font-bold text-slate-800">New Word</h2>
              <span className="w-9" />
            </header>

            <form onSubmit={submit} className="flex-1 space-y-4 overflow-y-auto px-4 py-5">
              <Field label="Word" required>
                <input className={inputCls} placeholder="e.g. Saudade" value={form.word} onChange={set('word')} autoFocus />
              </Field>
              <Field label="Pronunciation (Latin characters)">
                <input className={inputCls} placeholder="e.g. sow-DAH-jee" value={form.pronunciation} onChange={set('pronunciation')} />
              </Field>
              <Field label="Meaning / Direct translation" required>
                <input className={inputCls} placeholder="e.g. Bittersweet longing for something absent" value={form.meaning} onChange={set('meaning')} />
              </Field>
              <Field label="Context / How to use it">
                <textarea
                  rows={4}
                  className={inputCls + ' resize-none'}
                  placeholder="Where did you hear it? When would a local actually say it?"
                  value={form.context}
                  onChange={set('context')}
                />
              </Field>
              <Field label="Taught by">
                <input className={inputCls} placeholder="e.g. Marco from the hostel" value={form.taughtBy} onChange={set('taughtBy')} />
              </Field>
              <Field label="Category">
                <select className={inputCls + ' appearance-none'} value={form.category} onChange={set('category')}>
                  {CATEGORIES.map((c) => (
                    <option key={c} value={c}>{c}</option>
                  ))}
                </select>
              </Field>
              <Field label="Country of origin">
                <select className={inputCls + ' appearance-none'} value={form.country} onChange={set('country')}>
                  {COUNTRIES.map((c) => (
                    <option key={c.name} value={c.name}>{c.flag} {c.name}</option>
                  ))}
                </select>
              </Field>

              <div className="h-2" />
              <button
                type="submit"
                disabled={!valid}
                className="flex w-full items-center justify-center gap-2 rounded-2xl bg-brand-600 py-4 text-[15px] font-bold text-white shadow-lg shadow-brand-600/25 transition active:scale-[0.98] disabled:bg-slate-300 disabled:shadow-none"
              >
                <Check size={18} strokeWidth={2.5} /> Save to my LingoLog
              </button>
              <div className="h-6" />
            </form>
          </div>
        </div>
      );
    }

    // ---------- Directory view ----------

    function DirectoryView({ words, onImport }) {
      const groups = useMemo(() => {
        const byCountry = {};
        for (const w of words) {
          (byCountry[w.country] = byCountry[w.country] || []).push(w);
        }
        return Object.entries(byCountry)
          .map(([country, entries]) => ({
            country,
            count: entries.length,
            people: [...new Set(entries.map((e) => e.taughtBy))],
          }))
          .sort((a, b) => b.count - a.count);
      }, [words]);

      return (
        <div className="px-4 pb-32 pt-2">
          <div className="mb-4 rounded-2xl bg-gradient-to-br from-brand-600 to-brand-700 p-5 text-white shadow-lg shadow-brand-600/20">
            <p className="flex items-center gap-2 text-sm font-medium text-brand-100">
              <Sparkles size={15} /> Your journey so far
            </p>
            <p className="mt-1 text-3xl font-extrabold">
              {words.length} words · {groups.length} countries
            </p>
          </div>

          <div className="flex flex-col gap-3">
            {groups.map((g) => (
              <div
                key={g.country}
                className="flex items-center gap-4 rounded-2xl bg-white p-4 shadow-sm ring-1 ring-black/[0.04]"
              >
                <span className="text-3xl">{flagFor(g.country)}</span>
                <div className="min-w-0 flex-1">
                  <p className="font-bold text-slate-900">{g.country}</p>
                  <p className="truncate text-[13px] text-slate-500">
                    via {g.people.join(', ')}
                  </p>
                </div>
                <span className="rounded-full bg-brand-50 px-3 py-1.5 text-sm font-bold text-brand-700">
                  {g.count} {g.count === 1 ? 'word' : 'words'}
                </span>
              </div>
            ))}
            {groups.length === 0 && (
              <div className="mt-8 flex flex-col items-center gap-2 text-center">
                <div className="rounded-2xl bg-sand-100 p-4">
                  <Globe2 size={26} className="text-slate-400" />
                </div>
                <p className="font-semibold text-slate-600">No countries yet</p>
                <p className="max-w-[240px] text-sm text-slate-400">
                  Every word you save adds its country to your map.
                </p>
              </div>
            )}
          </div>
          <BackupBar words={words} onImport={onImport} />
          <Credit />
        </div>
      );
    }

    // ---------- App shell ----------

    function TabButton({ active, icon: Icon, label, onClick }) {
      return (
        <button
          onClick={onClick}
          className={
            'flex flex-1 flex-col items-center gap-0.5 py-2 text-[11px] font-semibold transition ' +
            (active ? 'text-brand-600' : 'text-slate-400')
          }
        >
          <Icon size={22} strokeWidth={active ? 2.4 : 2} />
          {label}
        </button>
      );
    }

    // v2: fresh key so logs saved before the starter words were removed
    // (and before categories existed) don't resurface.
    const STORAGE_KEY = 'lingolog-words-v2';

    function loadWords() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
        if (Array.isArray(saved)) return saved;
      } catch (e) {
        // corrupt or inaccessible storage — fall back to the starter set
      }
      return INITIAL_WORDS;
    }

    function App() {
      const [words, setWords] = useState(loadWords);

      useEffect(() => {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(words));
        } catch (e) {
          // storage unavailable (private mode, quota) — app still works in-memory
        }
      }, [words]);
      const [tab, setTab] = useState('library');
      const [query, setQuery] = useState('');
      const [adding, setAdding] = useState(false);
      const [selected, setSelected] = useState(null);
      const [toast, setToast] = useState(null);

      const saveWord = (entry) => {
        setWords([{ ...entry, id: Date.now() }, ...words]);
        setAdding(false);
        setTab('library');
        setQuery('');
        setToast(`“${entry.word}” saved!`);
        setTimeout(() => setToast(null), 2200);
      };

      const importWords = (imported) => {
        // merge: keep existing entries, add imported ones that aren't already here
        const existing = new Set(words.map((w) => w.id));
        const fresh = imported.filter((w) => !existing.has(w.id));
        setWords([...fresh, ...words]);
        setToast(fresh.length > 0 ? `Imported ${fresh.length} ${fresh.length === 1 ? 'word' : 'words'}!` : 'Already up to date');
        setTimeout(() => setToast(null), 2200);
      };

      return (
        <div className="mx-auto flex min-h-screen w-full max-w-md flex-col bg-sand-50 shadow-2xl">
          {/* Header */}
          <header className="flex items-center justify-between px-5 pb-3 pt-6">
            <div>
              <h1 className="text-2xl font-extrabold tracking-tight text-slate-900">
                Lingo<span className="text-brand-600">Log</span>
              </h1>
              <p className="text-[13px] text-slate-500">
                {tab === 'library' ? 'Words from people you met' : 'Where your words come from'}
              </p>
            </div>
            <div className="rounded-2xl bg-brand-50 p-2.5 text-brand-600">
              <Globe2 size={22} />
            </div>
          </header>

          {/* Views */}
          <main className="flex-1">
            {tab === 'library' ? (
              <LibraryView words={words} query={query} setQuery={setQuery} onSelect={setSelected} onImport={importWords} />
            ) : (
              <DirectoryView words={words} onImport={importWords} />
            )}
          </main>

          {/* Toast */}
          {toast && (
            <div className="fixed bottom-24 left-1/2 z-50 -translate-x-1/2 rounded-full bg-slate-900 px-4 py-2 text-sm font-medium text-white shadow-lg">
              ✓ {toast}
            </div>
          )}

          {/* Bottom tab bar */}
          <nav className="fixed bottom-0 left-1/2 z-20 w-full max-w-md -translate-x-1/2 border-t border-sand-200 bg-white/95 pb-2 backdrop-blur">
            <div className="relative flex items-center px-6">
              <TabButton active={tab === 'library'} icon={BookOpen} label="Library" onClick={() => setTab('library')} />
              {/* Center primary button */}
              <div className="flex flex-1 justify-center">
                <button
                  onClick={() => setAdding(true)}
                  aria-label="Add word"
                  className="-mt-6 flex h-14 w-14 items-center justify-center rounded-full bg-brand-600 text-white shadow-lg shadow-brand-600/40 ring-4 ring-sand-50 transition active:scale-95 hover:bg-brand-500"
                >
                  <Plus size={26} strokeWidth={2.5} />
                </button>
              </div>
              <TabButton active={tab === 'directory'} icon={Globe2} label="Countries" onClick={() => setTab('directory')} />
            </div>
          </nav>

          {/* Overlays */}
          {adding && <AddWordView onSave={saveWord} onCancel={() => setAdding(false)} />}
          <WordDetail entry={selected} onClose={() => setSelected(null)} />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
